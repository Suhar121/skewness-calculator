name: FastAPI CI/CD (Docker)

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  PROJECT_NAME: pipelinepal-app

jobs:
  test-and-build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pytest

          REQUIREMENTS_FILE="$(find . -maxdepth 4 -type f -name 'requirements*.txt' \
            ! -path './.venv/*' ! -path './venv/*' ! -path './node_modules/*' | head -n 1)"

          if [ -n "$REQUIREMENTS_FILE" ]; then
            echo "Installing dependencies from: $REQUIREMENTS_FILE"
            pip install -r "$REQUIREMENTS_FILE"
          else
            echo "No requirements*.txt found. Continuing with pytest only."
          fi

      - name: Run tests (if present)
        run: |
          if [ -d tests ]; then
            echo "Running tests from root"
          elif [ -d backend/tests ]; then
            cd backend
            echo "Running tests from backend/"
          else
            echo "No tests directory found. Skipping tests."
            exit 0
          fi

          set +e
          pytest -q
          exit_code=$?
          set -e

          if [ "$exit_code" -eq 5 ]; then
            echo "No tests collected. Skipping."
            exit 0
          fi

          exit "$exit_code"

      - name: Build Docker image
        run: |
          DOCKERFILE_PATH="$(find . -maxdepth 4 -type f -name 'Dockerfile' \
            ! -path './.venv/*' ! -path './venv/*' ! -path './node_modules/*' | head -n 1)"

          if [ -z "$DOCKERFILE_PATH" ]; then
            echo "No Dockerfile found. Cannot build Docker image."
            exit 1
          fi

          DOCKER_CONTEXT="$(dirname "$DOCKERFILE_PATH")"
          echo "Building Docker image using $DOCKERFILE_PATH (context: $DOCKER_CONTEXT)"
          docker build -f "$DOCKERFILE_PATH" -t $PROJECT_NAME:latest "$DOCKER_CONTEXT"
