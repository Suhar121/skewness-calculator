name: FastAPI CI/CD (Docker)

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  PROJECT_NAME: pipelinepal-app

jobs:
  test-and-build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then
            pip install -r requirements.txt
          elif [ -f backend/requirements.txt ]; then
            pip install -r backend/requirements.txt
          else
            echo "No requirements.txt found at root or backend/requirements.txt"
            exit 1
          fi

      - name: Run tests (if present)
        run: |
          if [ -f backend/requirements.txt ] && [ ! -f requirements.txt ]; then
            cd backend
          fi

          set +e
          pytest -q
          exit_code=$?
          set -e

          if [ "$exit_code" -eq 5 ]; then
            echo "No tests collected. Skipping."
            exit 0
          fi

          exit "$exit_code"

      - name: Build Docker image
        run: |
          if [ -f Dockerfile ]; then
            docker build -t $PROJECT_NAME:latest .
          elif [ -f backend/Dockerfile ]; then
            docker build -t $PROJECT_NAME:latest ./backend
          else
            echo "No Dockerfile found at root or backend/Dockerfile"
            exit 1
          fi
